name: Semantic PR check

# https://github.com/amannn/action-semantic-pull-request

on:
  workflow_call:

permissions:
  pull-requests: read

jobs:
  main:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@main
        env:
          GITHUB_TOKEN: ${{ github.token }}
